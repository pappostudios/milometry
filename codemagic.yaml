workflows:
  simulator-test:
    name: Simulator Test Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      flutter: beta
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Build iOS Simulator
        script: |
          flutter build ios \
            --simulator \
            --debug
          cd build/ios/iphonesimulator
          zip -r milometry_simulator.zip Runner.app

    artifacts:
      - build/ios/iphonesimulator/milometry_simulator.zip
