workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m2
    max_build_duration: 60

    integrations:
      app_store_connect: Erez Pappo Apple Dev  # Name this whatever you saved in Codemagic

    environment:
      # Pinned to an exact iOS 26-capable stable release. Do NOT use `master` —
      # Codemagic serves a stale pre-baked master snapshot whose bundled engine
      # predates iOS 26 and crashes on launch (registrarForPlugin: returns nil).
      flutter: 3.41.5
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pappostudios.milometry

    scripts:
      - name: Refresh Flutter engine artifacts for iOS 26
        script: |
          flutter --version
          flutter precache --ios --force --verbose
          flutter --version

      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod cache clean --all
          pod install

      - name: Build iOS release IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
