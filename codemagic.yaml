workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pappostudios.milometry
      vars:
        BUNDLE_ID: "com.pappostudios.milometry"
        APP_NAME: "Milometry"

    triggering:
      events:
        - push
      branch:
        pattern: "main"
        include: true

    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Build iOS release
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration

  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m2
    max_build_duration: 120

    environment:
      flutter: stable
      vars:
        APP_NAME: "Milometry"

    triggering:
      events:
        - push
      branch:
        pattern: "main"
        include: true

    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get

      - name: Build Android App Bundle
        script: |
          flutter build appbundle \
            --release

    artifacts:
      - build/app/outputs/bundle/release/*.aab

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
