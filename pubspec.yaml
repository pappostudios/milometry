name: psycho_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.2+16

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # ספריות חיצוניות
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.0
  flutter_tts: ^4.2.4
  change_app_package_name: ^1.5.0
  flutter_localizations:
    sdk: flutter
  timezone: ^0.10.1
  flutter_local_notifications: 19.5.0
  url_launcher: ^6.3.0
  in_app_review: ^2.0.9
  in_app_purchase: ^3.2.0
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/logo.jpg
    - assets/hebrew.json
    - assets/english.json
    - assets/icon.png 

# ההגדרות של האייקון
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
